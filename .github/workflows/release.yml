name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. v0.5.0) — use when tag push did not trigger CI'
        required: true

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: room-macos-arm64
            suffix: macos-arm64
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact: room-macos-x86_64
            suffix: macos-x86_64
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: room-linux-x86_64
            suffix: linux-x86_64

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}
      - name: Build
        run: cargo build --release --workspace --target ${{ matrix.target }}
      - name: Stage artifacts
        run: |
          cp target/${{ matrix.target }}/release/room ${{ matrix.artifact }}
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  release:
    name: Publish release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
      - name: Create checksums
        run: |
          cd artifacts
          sha256sum room-* > SHA256SUMS
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
          files: |
            artifacts/room-macos-arm64
            artifacts/room-macos-x86_64
            artifacts/room-linux-x86_64
            artifacts/SHA256SUMS
          generate_release_notes: true

  publish:
    name: Publish to crates.io
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Publish room-protocol
        continue-on-error: true
        run: cargo publish -p room-protocol --token ${{ secrets.CARGO_REGISTRY_TOKEN }} --allow-dirty
      - name: Wait for crates.io index
        run: sleep 30
      - name: Publish room-plugin-taskboard
        continue-on-error: true
        run: cargo publish -p room-plugin-taskboard --token ${{ secrets.CARGO_REGISTRY_TOKEN }} --allow-dirty
      - name: Wait for crates.io index
        run: sleep 30
      - name: Publish room-daemon
        continue-on-error: true
        run: cargo publish -p room-daemon --token ${{ secrets.CARGO_REGISTRY_TOKEN }} --allow-dirty
      - name: Wait for crates.io index
        run: sleep 30
      - name: Publish room-cli
        continue-on-error: true
        run: cargo publish -p room-cli --token ${{ secrets.CARGO_REGISTRY_TOKEN }} --allow-dirty
      - name: Wait for crates.io index
        run: sleep 30
