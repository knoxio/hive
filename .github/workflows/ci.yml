name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: Check formatting
        run: cargo fmt --check
      - name: Clippy
        run: cargo clippy -- -D warnings
      - name: Tests
        run: cargo test
      - name: Smoke tests (ignored)
        # Runs tests marked #[ignore]: ws_smoke (subprocess + WS/REST) and
        # ensure_daemon (subprocess auto-start). These spawn real `room` processes
        # and are fast on Linux CI (~100ms each) but excluded from the normal
        # `cargo test` run to keep local dev fast.
        # Non-blocking: smoke tests are inherently flaky (process startup timing)
        # and should not gate PRs. See #393 for daemon-mode incompatibility.
        continue-on-error: true
        run: cargo test -p room-cli -- --ignored

  changelog:
    name: Changelog
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Check changelog entry
        run: bash scripts/check-changelog.sh origin/${{ github.base_ref }}

  scripts:
    name: Shell Scripts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install shellcheck
        run: sudo apt-get install -y shellcheck
      - name: Shellcheck
        run: shellcheck --exclude=SC1091 scripts/*.sh
      - name: Shell tests
        run: |
          bash scripts/test-context-monitor.sh
          bash scripts/test-ralph-room.sh
          bash scripts/test-check-changelog.sh
