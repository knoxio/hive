name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    # sccache disabled — GitHub Actions cache outage persists (2026-03-16)
    # env:
    #   RUSTC_WRAPPER: sccache
    #   SCCACHE_GHA_ENABLED: "true"
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      # - uses: mozilla-actions/sccache-action@v0.0.7
      - uses: Swatinem/rust-cache@v2
      - name: Install cargo-nextest
        uses: taiki-e/install-action@nextest
      - name: Detect changed crates
        id: changed
        if: github.event_name == 'pull_request'
        run: |
          CHANGED=$(git diff --name-only origin/${{ github.base_ref }}...HEAD -- crates/)
          PACKAGES=""
          # Dependency chain: protocol -> plugin-*, daemon -> cli
          # If protocol changes, test everything
          if echo "$CHANGED" | grep -q "^crates/room-protocol/"; then
            PACKAGES="--workspace"
          else
            if echo "$CHANGED" | grep -q "^crates/room-daemon/"; then
              PACKAGES="$PACKAGES -p room-daemon -p room-cli"
            fi
            if echo "$CHANGED" | grep -q "^crates/room-cli/"; then
              PACKAGES="$PACKAGES -p room-cli"
            fi
            if echo "$CHANGED" | grep -q "^crates/room-ralph/"; then
              PACKAGES="$PACKAGES -p room-ralph"
            fi
            if echo "$CHANGED" | grep -q "^crates/room-plugin-agent/"; then
              PACKAGES="$PACKAGES -p room-plugin-agent -p room-daemon -p room-cli"
            fi
            if echo "$CHANGED" | grep -q "^crates/room-plugin-taskboard/"; then
              PACKAGES="$PACKAGES -p room-plugin-taskboard -p room-daemon -p room-cli"
            fi
            # Deduplicate -p flags
            PACKAGES=$(echo "$PACKAGES" | tr ' ' '\n' | sort -u | tr '\n' ' ')
          fi
          # If no crate changes detected (e.g. docs/scripts only), skip tests
          if [ -z "$PACKAGES" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "packages=$PACKAGES" >> "$GITHUB_OUTPUT"
          fi
          echo "Detected test scope: ${PACKAGES:-SKIP}"
      - name: Check formatting
        run: cargo fmt --check
      - name: Clippy
        run: cargo clippy -- -D warnings
      - name: Tests
        if: steps.changed.outputs.skip != 'true'
        run: |
          if [ "${{ github.event_name }}" = "push" ] || [ -z "${{ steps.changed.outputs.packages }}" ]; then
            cargo nextest run
          else
            # Exit code 4 = no tests matched the filter (acceptable for narrow -p scopes)
            cargo nextest run ${{ steps.changed.outputs.packages }} || [ $? -eq 4 ]
          fi
      - name: Smoke tests (ignored)
        # Runs tests marked #[ignore]: ws_smoke (subprocess + WS/REST).
        # These spawn real `room` processes and are fast on Linux CI (~100ms each)
        # but excluded from the normal test run to keep local dev fast.
        continue-on-error: true
        run: cargo nextest run -p room-cli --run-ignored ignored-only

  changelog:
    name: Changelog
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Check changelog entry
        run: bash scripts/check-changelog.sh origin/${{ github.base_ref }}
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          GH_TOKEN: ${{ github.token }}

  scripts:
    name: Shell Scripts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install shellcheck
        run: sudo apt-get install -y shellcheck
      - name: Shellcheck
        run: shellcheck --exclude=SC1091 scripts/*.sh
      - name: Shell tests
        run: |
          bash scripts/test-context-monitor.sh
          bash scripts/test-ralph-room.sh
          bash scripts/test-check-changelog.sh
