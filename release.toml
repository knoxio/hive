sign-commit = false
sign-tag = false
push = true
publish = false  # CI handles publish via crates.io token
pre-release-commit-message = "chore: release {{version}}"
tag-message = ""

# Changelog version pegging — on `cargo release`, each crate's [Unreleased]
# heading is replaced with a versioned entry and a fresh [Unreleased] is added.
# Comparison links at the bottom of each CHANGELOG must be updated manually
# during release prep (mixed workspace/per-crate tag formats make automation brittle).

[[pre-release-replacements]]
file = "CHANGELOG.md"
search = "## \\[Unreleased\\]"
replace = "## [Unreleased]\n\n## [{{version}}] - {{date}}"
min = 0
